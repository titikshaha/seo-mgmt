<style>
/* ── Hero CTA ─────────────────────────────────────── */
.hero-cta {
  background: linear-gradient(135deg, var(--bg-elevated) 0%, var(--bg-base) 60%);

  border-radius: var(--r-xl);

  text-align: center;
  position: relative;
  overflow: hidden;
  margin: var(--space-24) 0;

.hero-cta::before {

  width: 600px; height: 300px;
  background: radial-gradient(ellipse, rgba(240,165,0,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.hero-cta::after {

@media (max-width: 640px) {
